<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一个十六级，为你</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }
        
        /* 首页样式 - 保持滚动 */
        .main-page {
            min-height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        /* 全屏页面 - 独立滚动 */
        .fullscreen-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0c0c1c 100%);
            z-index: 1000;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .fullscreen-page.active {
            display: block;
            opacity: 1;
        }
        
        /* 阻止背景滚动当全屏页面打开时 */
        body.no-scroll {
            overflow: hidden;
        }
        
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            padding: 60px 20px 100px;
            user-select: none;
        }
        
        /* 艺术字标题 - 纯银白色 */
        .main-title {
            font-size: 4.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffffff, #f0f0f0, #e8e8e8, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: artGlow 3s ease-in-out infinite alternate, bounce 2s ease-in-out infinite;
            font-family: "STKaiti", "KaiTi", "Microsoft YaHei", cursive;
            position: relative;
            display: inline-block;
        }
        
        /* 艺术字副标题 - 银白色 */
        .main-subtitle {
            font-size: 2.5rem;
            color: #f0f0f0;
            opacity: 0.9;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(240, 240, 240, 0.7);
            font-family: "STKaiti", "KaiTi", "Microsoft YaHei", cursive;
            animation: subtitleGlow 4s ease-in-out infinite alternate;
        }
        
        .start-button-container {
            margin-top: 40px;
        }
        
        .start-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #ffffff;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .start-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }
        
        .start-button i {
            font-size: 1.4rem;
        }
        
        .days-container {
            position: relative;
            min-height: 700px; /* 增加高度让云朵更分散 */
            margin-top: 30px;
            padding: 20px;
        }
        
        /* 云朵形框框 - 银白色 */
        .day-card {
            width: 150px;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: absolute;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            z-index: 2;
            border-radius: 50%;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }
        
        /* 银白色渐变 - 移除所有黄色 */
        .day-card.day1 {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .day-card.day1:hover {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.4), 0 0 45px rgba(255, 255, 255, 0.2);
        }
        
        .day-card.day2 {
            background: rgba(255, 255, 255, 0.14);
        }
        
        .day-card.day2:hover {
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5), 0 0 50px rgba(255, 255, 255, 0.3);
        }
        
        .day-card.day3 {
            background: rgba(255, 255, 255, 0.18);
        }
        
        .day-card.day3:hover {
            background: rgba(255, 255, 255, 0.26);
            box-shadow: 0 0 45px rgba(255, 255, 255, 0.6), 0 0 55px rgba(255, 255, 255, 0.4);
        }
        
        .day-card.day4 {
            background: rgba(255, 255, 255, 0.22);
        }
        
        .day-card.day4:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.7), 0 0 60px rgba(255, 255, 255, 0.5);
        }
        
        .day-card.day5 {
            background: rgba(255, 255, 255, 0.26);
        }
        
        .day-card.day5:hover {
            background: rgba(255, 255, 255, 0.34);
            box-shadow: 0 0 55px rgba(255, 255, 255, 0.8), 0 0 65px rgba(255, 255, 255, 0.6);
        }
        
        /* 云朵效果 */
        .day-card::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            top: 12px;
            left: 12px;
            z-index: -1;
        }
        
        .day-card.day1::before { background: rgba(255, 255, 255, 0.1); }
        .day-card.day2::before { background: rgba(255, 255, 255, 0.14); }
        .day-card.day3::before { background: rgba(255, 255, 255, 0.18); }
        .day-card.day4::before { background: rgba(255, 255, 255, 0.22); }
        .day-card.day5::before { background: rgba(255, 255, 255, 0.26); }
        
        .day-card::after {
            content: '';
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            top: 6px;
            right: 12px;
            z-index: -1;
        }
        
        .day-card.day1::after { background: rgba(255, 255, 255, 0.1); }
        .day-card.day2::after { background: rgba(255, 255, 255, 0.14); }
        .day-card.day3::after { background: rgba(255, 255, 255, 0.18); }
        .day-card.day4::after { background: rgba(255, 255, 255, 0.22); }
        .day-card.day5::after { background: rgba(255, 255, 255, 0.26); }
        
        /* 云朵底部 */
        .day-card .cloud-bottom {
            position: absolute;
            width: 100%;
            height: 25px;
            border-radius: 50%;
            bottom: 0;
            z-index: -1;
        }
        
        .day-card.day1 .cloud-bottom { background: rgba(255, 255, 255, 0.1); }
        .day-card.day2 .cloud-bottom { background: rgba(255, 255, 255, 0.14); }
        .day-card.day3 .cloud-bottom { background: rgba(255, 255, 255, 0.18); }
        .day-card.day4 .cloud-bottom { background: rgba(255, 255, 255, 0.22); }
        .day-card.day5 .cloud-bottom { background: rgba(255, 255, 255, 0.26); }
        
        .day-card.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: float 6s ease-in-out infinite;
        }
        
        .day-card:hover {
            transform: translateY(-6px) scale(1.04);
        }
        
        .day-number {
            font-size: 1.9rem;
            font-weight: bold;
            margin-bottom: 4px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
        }
        
        /* 银白色发光文字 - 移除黄色 */
        .day-card .day-number { color: #ffffff; }
        .day-card .day-text { color: #f0f0f0; }
        .day-card .day-desc { color: #e8e8e8; }
        
        .day-text {
            font-size: 1.1rem;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
        }
        
        .day-desc {
            font-size: 0.85rem;
            margin-top: 6px;
            text-align: center;
            padding: 0 6px;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
        }
        
        .decoration {
            position: absolute;
            z-index: 1;
            opacity: 0.7;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }
        
        .footer {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            color: #d8e8f0;
            font-size: 0.9rem;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            text-shadow: 0 0 8px rgba(216, 232, 240, 0.7);
        }
        
        /* 全屏页面样式 */
        .fullscreen-header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
            z-index: 3;
        }
        
        .fullscreen-title {
            font-size: 3rem;
            background: linear-gradient(45deg, #ffffff, #f0f0f0, #e8e8e8, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.7);
            font-family: "STKaiti", "KaiTi", "Microsoft YaHei", cursive;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        .fullscreen-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 100px; /* 增加底部内边距，为返回按钮留出空间 */
            text-align: center;
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 200px); /* 确保内容区域足够高 */
        }
        
        /* 全屏页面内容样式 */
        .fullscreen-text-content {
            font-size: 1.3rem;
            line-height: 2.0;
            text-align: left;
            margin: 20px 0;
            padding: 0 20px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 2;
        }
        
        .fullscreen-text-content p {
            margin-bottom: 25px;
            text-indent: 2em;
        }
        
        .fullscreen-text-content .highlight {
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
            font-size: 1.4rem;
        }
        
        .fullscreen-text-content .quote {
            font-style: italic;
            color: #f0f0f0;
            padding: 15px 25px;
            border-left: 4px solid rgba(255, 255, 255, 0.6);
            margin: 25px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 1.4rem;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        /* 分页面返回按钮 - 固定在内容区域右下角 */
        .fullscreen-back-button {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 40px; /* 距离内容上方有间距 */
            position: relative; /* 相对定位 */
            float: right; /* 右浮动，使其位于右下角 */
            margin-right: 20px; /* 距离右边距 */
        }
        
        .fullscreen-back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }
        
        /* 主页银白色星光掉落效果 */
        .main-star-drop {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            animation: starDrop 6s linear infinite;
        }
        
        /* 主页闪烁星光效果 */
        .main-twinkle-star {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: mainTwinkle 4s ease-in-out infinite;
        }
        
        /* 主页静态星光背景 */
        .main-static-star {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 飘屏粒子 */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.9));
        }
        
        /* 分页面粒子特效 - 金银混搭 */
        .page-particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }
        
        /* 分页面金银混搭粒子 */
        .page-particle.silver-star, .page-particle.gold-star {
            opacity: 0;
            animation: starTwinkle 2s ease-in-out infinite;
        }
        
        /* 分页面金银混搭飘动粒子 */
        .page-particle.silver-sparkle, .page-particle.gold-sparkle {
            opacity: 0;
            animation: starFloat 5s linear infinite;
        }
        
        /* 分页面背景效果 - 金银混搭星光背景 */
        .page-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        
        .silver-twinkle-star, .gold-twinkle-star {
            position: absolute;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        
        .silver-twinkle-star {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
        }
        
        .gold-twinkle-star {
            background: rgba(255, 215, 0, 0.9);
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
        }
        
        .silver-sparkle, .gold-sparkle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            filter: blur(0.5px);
            animation: sparkleTwinkle 2s ease-in-out infinite;
        }
        
        .silver-sparkle {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.7);
        }
        
        .gold-sparkle {
            background: rgba(255, 215, 0, 0.9);
            box-shadow: 0 0 8px 2px rgba(255, 215, 0, 0.7);
        }
        
        .silver-glow-dot, .gold-glow-dot {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            filter: blur(1px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        .silver-glow-dot {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 12px 3px rgba(255, 255, 255, 0.6);
        }
        
        .gold-glow-dot {
            background: rgba(255, 215, 0, 0.9);
            box-shadow: 0 0 12px 3px rgba(255, 215, 0, 0.6);
        }
        
        /* 动态大星光效果 - 移除主页面黄色 */
        .shining-star {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
            opacity: 0;
        }
        
        .shining-star-1 {
            background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.4) 40%, rgba(255, 255, 255, 0.1) 60%, transparent 100%);
            box-shadow: 0 0 100px 30px rgba(255, 255, 255, 0.6);
            animation: starShine1 8s ease-in-out infinite;
        }
        
        .shining-star-2 {
            /* 修改为银白色，移除黄色 */
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.4) 40%, rgba(255, 255, 255, 0.1) 60%, transparent 100%);
            box-shadow: 0 0 120px 40px rgba(255, 255, 255, 0.5);
            animation: starShine2 10s ease-in-out infinite 2s;
        }
        
        .shining-star-3 {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.3) 40%, rgba(255, 255, 255, 0.1) 60%, transparent 100%);
            box-shadow: 0 0 80px 20px rgba(255, 255, 255, 0.4);
            animation: starShine3 12s ease-in-out infinite 1s;
        }
        
        /* 动画效果优化 - 更流畅自然的动画 */
        @keyframes artGlow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.6),
                           0 0 20px rgba(240, 240, 240, 0.4),
                           0 0 30px rgba(232, 232, 232, 0.2);
            }
            50% { 
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                           0 0 25px rgba(240, 240, 240, 0.6),
                           0 0 35px rgba(232, 232, 232, 0.4);
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes subtitleGlow {
            0% { 
                text-shadow: 0 0 6px rgba(240, 240, 240, 0.4),
                           0 0 12px rgba(240, 240, 240, 0.2);
            }
            100% { 
                text-shadow: 0 0 10px rgba(240, 240, 240, 0.6),
                           0 0 16px rgba(240, 240, 240, 0.4);
            }
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0) rotate(0deg);
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            }
            50% { 
                transform: translateY(-5px) rotate(1deg);
                filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.4));
            }
        }
        
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
                filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.3));
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) rotate(90deg) scale(1);
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            }
            90% {
                opacity: 1;
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            }
            100% {
                transform: translateY(-100px) rotate(180deg) scale(0.5);
                opacity: 0;
                filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.3));
            }
        }
        
        @keyframes softAppear {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(15px);
                filter: blur(3px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
        
        @keyframes titleGlow {
            0% { 
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.6),
                           0 0 20px rgba(240, 240, 240, 0.4);
            }
            100% { 
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                           0 0 25px rgba(240, 240, 240, 0.6);
            }
        }
        
        /* 主页银白色星光掉落动画 */
        @keyframes starDrop {
            0% {
                transform: translateY(-100px) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
                transform: translateY(10vh) rotate(45deg) scale(0.8);
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(90deg) scale(0.3);
                opacity: 0;
            }
        }
        
        /* 主页闪烁星光动画 */
        @keyframes mainTwinkle {
            0%, 100% { 
                opacity: 0.3;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.2);
            }
        }
        
        /* 分页面金银混搭星光动画 */
        @keyframes starTwinkle {
            0%, 100% { 
                opacity: 0.2;
                transform: scale(1);
            }
            50% { 
                opacity: 0.8;
                transform: scale(1.2);
            }
        }
        
        @keyframes starFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
                transform: translateY(90vh) rotate(120deg) scale(1);
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) rotate(240deg) scale(0.6);
                opacity: 0;
            }
        }
        
        @keyframes sparkleTwinkle {
            0%, 100% { 
                opacity: 0.3;
                transform: scale(1);
            }
            50% { 
                opacity: 0.9;
                transform: scale(1.3);
            }
        }
        
        @keyframes glowPulse {
            0%, 100% { 
                opacity: 0.2;
                transform: scale(1);
            }
            50% { 
                opacity: 0.6;
                transform: scale(1.1);
            }
        }
        
        /* 大星光闪烁动画 - 主页面移除黄色 */
        @keyframes starShine1 {
            0%, 100% { 
                opacity: 0;
                transform: scale(0.5) rotate(0deg);
                filter: blur(5px);
            }
            20% { 
                opacity: 0.7;
                transform: scale(1.2) rotate(10deg);
                filter: blur(8px);
            }
            40% { 
                opacity: 1;
                transform: scale(1.5) rotate(-5deg);
                filter: blur(10px);
            }
            60% { 
                opacity: 0.9;
                transform: scale(1.8) rotate(5deg);
                filter: blur(12px);
            }
            80% { 
                opacity: 0.5;
                transform: scale(1.2) rotate(-3deg);
                filter: blur(8px);
            }
        }
        
        @keyframes starShine2 {
            0%, 100% { 
                opacity: 0;
                transform: scale(0.4) rotate(0deg);

        }
        
        // 初始化星星 - 银白色为主
        function initStars() {
            stars = [];
            const starCount = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));
            
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.0 + 0.3,
                    speed: Math.random() * 0.15 + 0.05,
                    opacity: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinkleDirection: Math.random() > 0.5 ? 1 : -1
                });
            }
        }
        
        // 优化绘制星星 - 更流畅
        function drawStars(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const deltaTime = timestamp - lastFrameTime;
            
            if (deltaTime > frameInterval) {
                // 使用更高效的清除方式
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 简化背景渐变
                const gradient = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 0,
                    canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.6
                );
                gradient.addColorStop(0, 'rgba(10, 10, 30, 0.1)');
                gradient.addColorStop(1, 'rgba(5, 5, 15, 0.8)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 批量绘制星星
                stars.forEach(star => {
                    // 平滑的闪烁效果
                    star.opacity += star.twinkleSpeed * star.twinkleDirection;
                    if (star.opacity > 0.6 || star.opacity < 0.1) {
                        star.twinkleDirection *= -1;
                    }
                    
                    // 更缓慢的移动
                    star.y += star.speed;
                    if (star.y > canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * canvas.width;
                    }
                    
                    // 绘制星星 - 更小的光芒
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    
                    // 银白色星星
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    ctx.fill();
                    
                    // 小的发光效果
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius * 1.5, 0, Math.PI * 2);
                    const glowGradient = ctx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, star.radius * 1.5
                    );
                    glowGradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity * 0.3})`);
                    glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = glowGradient;
                    ctx.fill();
                });
                
                lastFrameTime = timestamp;
            }
            
            animationFrameId = requestAnimationFrame(drawStars);
        }

            shiningStars.push(silverStar1);
            
            // 创建银白色大星光2
            const silverStar2 = document.createElement('div');
            silverStar2.className = 'shining-star shining-star-2 performance-optimized';
            silverStar2.style.width = '120px';
            silverStar2.style.height = '120px';
            silverStar2.style.left = '80%';
            silverStar2.style.top = '15%';
            mainPage.appendChild(silverStar2);
            shiningStars.push(silverStar2);
            
            // 创建银白色大星光3
            const silverStar3 = document.createElement('div');
            silverStar3.className = 'shining-star shining-star-3 performance-optimized';
            silverStar3.style.width = '180px';
            silverStar3.style.height = '180px';
            silverStar3.style.left = '15%';
            silverStar3.style.top = '70%';
            mainPage.appendChild(silverStar3);
            shiningStars.push(silverStar3);
            
            // 创建银白色大星光4
            const silverStar4 = document.createElement('div');
            silverStar4.className = 'shining-star shining-star-1 performance-optimized';
            silverStar4.style.width = '140px';
            silverStar4.style.height = '140px';
            silverStar4.style.left = '75%';
            silverStar4.style.top = '75%';
            mainPage.appendChild(silverStar4);
            shiningStars.push(silverStar4);
        }
        
        // 开始主页星光掉落效果
        function startMainStarDropEffect() {
            // 清除现有粒子
            mainStarDropParticles.forEach(p => {
                if (p.parentNode) p.parentNode.removeChild(p);
            });
            mainStarDropParticles = [];
            
            if (mainStarDropInterval) {
                clearInterval(mainStarDropInterval);
            }
            
            // 创建星光掉落粒子
            mainStarDropInterval = setInterval(() => {
                if (mainStarDropParticles.length < 25) {
                    createMainStarDropParticle();
                }
            }, 300);
            
            // 初始粒子
            setTimeout(() => {
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        createMainStarDropParticle();
                    }, i * 150);
                }
            }, 300);
        }
        
        // 停止主页星光掉落效果
        function stopMainStarDropEffect() {
            if (mainStarDropInterval) {
                clearInterval(mainStarDropInterval);
                mainStarDropInterval = null;
            }
            
            mainStarDropParticles.forEach(particle => {
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, Math.random() * 500);
            });
        }
        
        // 停止主页所有星光效果
        function stopMainAllStars() {
            stopMainStarDropEffect();
            
            mainTwinkleStars.forEach(star => {
                setTimeout(() => {
                    if (star.parentNode) {
                        star.parentNode.removeChild(star);
                    }
                }, Math.random() * 300);
            });
            mainTwinkleStars = [];
            
            mainStaticStars.forEach(star => {
                setTimeout(() => {
                    if (star.parentNode) {
                        star.parentNode.removeChild(star);
                    }
                }, Math.random() * 300);
            });
            mainStaticStars = [];
            
            // 停止大星光
            shiningStars.forEach(star => {
                setTimeout(() => {
                    if (star.parentNode) {
                        star.parentNode.removeChild(star);
                    }
                }, Math.random() * 300);
            });
            shiningStars = [];
        }
        
        // 恢复主页所有星光效果
        function resumeMainAllStars() {
            startMainStarDropEffect();
            createMainStaticStars();
            createMainTwinkleStars();
            createShiningStars();
        }
        
        // 创建分页面金银混搭星光背景
        function createPageBackgroundStars(container) {
            pageBackgroundStars = [];
            
            const background = document.createElement('div');
            background.className = 'page-background';
            
            // 银白色和金黄色混合的小星星
            for (let i = 0; i < 40; i++) {
                const isGold = Math.random() > 0.5;
                const star = document.createElement('div');
                star.className = isGold ? 'gold-twinkle-star' : 'silver-twinkle-star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 0.6; // 更小的星星
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                background.appendChild(star);
                pageBackgroundStars.push(star);
            }
            
            // 闪光点
            for (let i = 0; i < 15; i++) {
                const isGold = Math.random() > 0.5;
                const sparkle = document.createElement('div');
                sparkle.className = isGold ? 'gold-sparkle' : 'silver-sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                background.appendChild(sparkle);
                pageBackgroundStars.push(sparkle);
            }
            
            // 荧光点
            for (let i = 0; i < 10; i++) {
                const isGold = Math.random() > 0.5;
                const glow = document.createElement('div');
                glow.className = isGold ? 'gold-glow-dot' : 'silver-glow-dot';
                glow.style.left = Math.random() * 100 + '%';
                glow.style.top = Math.random() * 100 + '%';
                glow.style.animationDelay = Math.random() * 3 + 's';
                background.appendChild(glow);
                pageBackgroundStars.push(glow);
            }
            
            container.insertBefore(background, container.firstChild);
        }
        
        // 创建分页面金银混搭星光粒子
        function createSilverGoldParticle(container) {
            if (pageParticles.length > 60) return; // 限制粒子数量
            
            const particle = document.createElement('div');
            particle.className = 'page-particle performance-optimized';
            
            // 金银混搭
            const isGold = Math.random() > 0.5;
            const particleTypes = isGold ? ['gold-star', 'gold-sparkle'] : ['silver-star', 'silver-sparkle'];
            const type = particleTypes[Math.floor(Math.random() * particleTypes.length)];
            
            particle.classList.add(type);
            
            if (type.includes('star')) {
                // 星星效果 - 更小的尺寸
                const starSize = Math.random() * 10 + 6;
                particle.style.width = starSize + 'px';
                particle.style.height = starSize + 'px';
                
                if (type === 'silver-star') {
                    particle.style.background = 'radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.3) 70%, transparent 100%)';
                    particle.style.boxShadow = '0 0 6px rgba(255, 255, 255, 0.6)';
                } else {
                    particle.style.background = 'radial-gradient(circle, rgba(255,215,0,0.8) 0%, rgba(255,215,0,0.3) 70%, transparent 100%)';
                    particle.style.boxShadow = '0 0 6px rgba(255, 215, 0, 0.6)';
                }
                
                particle.style.borderRadius = '50%';
                particle.style.animationDuration = Math.random() * 1.5 + 1.5 + 's';
            } else {
                // 闪光效果 - 更小的尺寸
                const sparkleSize = Math.random() * 8 + 4;
                particle.style.width = sparkleSize + 'px';
                particle.style.height = sparkleSize + 'px';
                
                if (type === 'silver-sparkle') {
                    particle.style.background = 'radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 50%, transparent 100%)';
                } else {
                    particle.style.background = 'radial-gradient(circle, rgba(255,215,0,0.9) 0%, rgba(255,215,0,0.5) 50%, transparent 100%)';
                }
                
                particle.style.borderRadius = '50%';
                particle.style.animationDuration = Math.random() * 4 + 2 + 's'; // 2-6秒
            }
            
            // 随机位置
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = '-20px';
            
            // 随机动画延迟
            particle.style.animationDelay = Math.random() * 2 + 's';
            
            container.appendChild(particle);
            pageParticles.push(particle);
            
            // 粒子生命周期结束后移除
            const duration = type.includes('star') ? 2.5 : 7; // 星星2.5秒，闪光粒子7秒
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
                pageParticles = pageParticles.filter(p => p !== particle);
            }, duration * 1000);
        }
        
        // 开始分页面粒子效果
        function startPageParticleEffect(container) {
            if (pageParticleInterval) {
                clearInterval(pageParticleInterval);
            }
            
            pageParticleInterval = setInterval(() => {
                if (pageParticles.length < 40) {
                    createSilverGoldParticle(container);
                }
            }, 200);
            
            // 初始粒子
            setTimeout(() => {
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        createSilverGoldParticle(container);
                    }, i * 100);
                }
            }, 300);
        }
        
        // 停止分页面粒子效果
        function stopPageParticleEffect() {
            if (pageParticleInterval) {
                clearInterval(pageParticleInterval);
                pageParticleInterval = null;
            }
            
            pageParticles.forEach(particle => {
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, Math.random() * 500);
            });
            pageParticles = [];
            
            // 清理背景星光
            pageBackgroundStars.forEach(star => {
                setTimeout(() => {
                    if (star.parentNode) {
                        star.parentNode.removeChild(star);
                    }
                }, Math.random() * 500);
            });
            pageBackgroundStars = [];
        }
        
        // 打开全屏页面
        function openFullscreenPage(index) {
            const data = daysData[index];
            currentFullscreenPage = index;
            
            // 停止主页效果
            stopMainAllStars();
            
            // 创建全屏页面
            const fullscreenPage = document.createElement('div');
            fullscreenPage.className = 'fullscreen-page performance-optimized';
            fullscreenPage.id = 'fullscreenPage';
            
            // 将返回按钮移动到内容容器内
            fullscreenPage.innerHTML = data.content;
            
            // 添加背景星光
            createPageBackgroundStars(fullscreenPage);
            
            // 添加金银混搭粒子效果
            startPageParticleEffect(fullscreenPage);
            
            document.body.appendChild(fullscreenPage);
            document.body.classList.add('no-scroll');
            
            // 淡入动画
            setTimeout(() => {
                fullscreenPage.classList.add('active');
            }, 10);
        }
        
        // 关闭全屏页面
        function closeFullscreenPage() {
            const fullscreenPage = document.getElementById('fullscreenPage');
            if (fullscreenPage) {
                // 停止粒子效果
                stopPageParticleEffect();
                
                // 淡出动画
                fullscreenPage.classList.remove('active');
                
                setTimeout(() => {
                    if (fullscreenPage.parentNode) {
                        fullscreenPage.parentNode.removeChild(fullscreenPage);
                    }
                    document.body.classList.remove('no-scroll');
                    
                    // 恢复主页效果
                    resumeMainAllStars();
                    
                    currentFullscreenPage = null;
                }, 300);
            }
        }
        
        // 创建飘屏粒子
        function createFloatingParticle() {
            if (floatingParticles.length > 20) return;
            
            const particle = document.createElement('div');
            particle.className = 'floating-particle performance-optimized';
            
            // 随机选择样式
            const styles = ['✧', '✦', '✶', '✷', '✸', '✹'];
            const style = styles[Math.floor(Math.random() * styles.length)];
            
            particle.innerHTML = `<div style="font-size: ${Math.random() * 18 + 12}px; color: rgba(255, 255, 255, ${Math.random() * 0.4 + 0.6});">${style}</div>`;
            
            // 随机起始位置
            const startX = Math.random() * 100;
            particle.style.left = `${startX}%`;
            particle.style.top = '100%';
            
            document.querySelector('.main-page').appendChild(particle);
            
            // 随机动画参数
            const duration = Math.random() * 8 + 8; // 8-16秒
            const delay = Math.random() * 5;
            
            particle.style.animation = `floatParticle ${duration}s cubic-bezier(0.4, 0.2, 0.7, 0.1) ${delay}s infinite`;
            
            floatingParticles.push(particle);
        }
        
        // 开始飘屏效果
        function startFloatingEffect() {
            if (particleInterval) {
                clearInterval(particleInterval);
            }
            
            particleInterval = setInterval(() => {
                if (floatingParticles.length < 15) {
                    createFloatingParticle();
                }
            }, 800);
        }
        
        // 停止飘屏效果
        function stopFloatingEffect() {
            if (particleInterval) {
                clearInterval(particleInterval);
                particleInterval = null;
            }
            
            floatingParticles.forEach(particle => {
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, Math.random() * 1000);
            });
            floatingParticles = [];
        }
        
        // 初始化
        function init() {
            resizeCanvas();
            drawStars();
            initDayCards();
            
            // 初始化飘屏效果
            setTimeout(() => {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        createFloatingParticle();
                    }, i * 300);
                }
                startFloatingEffect();
            }, 1000);
            
            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                resizeCanvas();
                
                // 重新创建星光效果以适应新尺寸
                if (cardsRevealed > 0) {
                    resumeMainAllStars();
                }
            });
        }
        
        // 开始页面加载
        init();
    </script>
</body>
</html>
